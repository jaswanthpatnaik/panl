name: Build Windows Portable Executable

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build Standalone Executable with PyInstaller
      run: |
        pyinstaller --onefile --name pnal --add-data "panl/templates;panl/templates" --add-data "rules;rules" --paths . panl/cli.py

    - name: Upload Standalone EXE Artifact
      uses: actions/upload-artifact@v4
      with:
        name: pnal-windows-executable
        path: dist/pnal.exe
