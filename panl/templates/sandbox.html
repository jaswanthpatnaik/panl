<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Safe Sandbox View | {{ filename }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { background: #050608; color: #f0f0f0; font-family: 'Space Grotesk', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { padding: 1rem 2rem; background: #0e1015; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        .back-btn { color: #00f2ff; text-decoration: none; font-size: 0.9rem; transition: 0.3s; }
        .back-btn:hover { text-shadow: 0 0 10px #00f2ff; }
        .sandbox-container { flex-grow: 1; position: relative; background: #1a1b1e; display: flex; align-items: center; justify-content: center; }
        .pdf-frame { width: 100%; height: 100%; border: none; background: #fff; }
        .warning-banner { background: rgba(255, 0, 85, 0.15); color: #ff0055; padding: 0.6rem; text-align: center; font-size: 0.8rem; border-bottom: 1px solid rgba(255,0,85,0.3); font-weight: 600; letter-spacing: 1px; }
        .error-state { text-align: center; padding: 3rem; }
        .error-state h3 { color: #ff0055; }
    </style>
</head>
<body>
    <header>
        <div>
            <a href="/report/{{ filename }}" class="back-btn">← RETURN TO INTEL REPORT</a>
            <h2 style="margin: 0.5rem 0 0 0; letter-spacing: 1px;">SAFE PREVIEW: {{ filename }}</h2>
        </div>
        <div style="text-align: right;">
            <div style="color: #00ff88; font-size: 0.8rem; font-weight: 600;">ISOLATION: ACTIVE</div>
            <div style="color: #888; font-size: 0.7rem;">HARDENED BROWSER SANDBOX</div>
        </div>
    </header>
    <div class="warning-banner">
        [!] ACTIVE CONTENT BLOCKER ENGAGED: ALL JAVASCRIPT AND SYSTEM CALLS HAVE BEEN STRIPPED FROM THIS VIEW.
    </div>
    <div class="sandbox-container">
        <!-- ISOLATION: Relying on backend CSP (script-src 'none') for total script neutralization -->
        <iframe 
            src="/preview/{{ filename }}" 
            class="pdf-frame">
        </iframe>
    </div>
</body>
</html>
